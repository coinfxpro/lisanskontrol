version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: license-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: licensedb
      POSTGRES_USER: ${POSTGRES_USER:-licenseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - license-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-licenseuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: license-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-licenseuser}:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/licensedb
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - license-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: license-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - license-network

volumes:
  postgres_data:

networks:
  license-network:
    driver: bridge
